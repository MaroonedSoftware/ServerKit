<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4EC9B0"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="120" height="120" rx="22" ry="22" fill="url(#bg)"/>

  <!-- relation graph edges -->
  <g stroke="url(#edge)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9">
    <line x1="64" y1="40" x2="34" y2="88"/>
    <line x1="64" y1="40" x2="94" y2="88"/>
    <line x1="34" y1="88" x2="94" y2="88"/>
    <line x1="94" y1="88" x2="108" y2="60" stroke-dasharray="3 4" opacity="0.6"/>
  </g>

  <!-- inheritance / ttu hint node -->
  <circle cx="108" cy="60" r="6" fill="#4EC9B0" opacity="0.6"/>

  <!-- relation nodes -->
  <circle cx="34" cy="88" r="9" fill="#4EC9B0"/>
  <circle cx="94" cy="88" r="9" fill="#4EC9B0"/>

  <!-- top "locked" node -->
  <circle cx="64" cy="40" r="18" fill="#0F172A" stroke="#4EC9B0" stroke-width="3"/>

  <!-- padlock glyph -->
  <g fill="#E2E8F0">
    <path d="M58 40 v-5 a6 6 0 0 1 12 0 v5" fill="none" stroke="#E2E8F0" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="55" y="40" width="18" height="13" rx="2" ry="2"/>
    <circle cx="64" cy="46" r="1.6" fill="#0F172A"/>
  </g>
</svg>
